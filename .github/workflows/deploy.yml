name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Generate PNG icons + social share image from SVG
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 192 -h 192 public/icon.svg -o public/icon-192.png
          rsvg-convert -w 512 -h 512 public/icon.svg -o public/icon-512.png
          rsvg-convert -w 1200 -h 630 public/social-card.svg -o public/og-image.png

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_STRIPE_PREMIUM_LINK: ${{ secrets.VITE_STRIPE_PREMIUM_LINK }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_KEY: ${{ secrets.VITE_GOOGLE_MAPS_KEY }}

      # Primary: GitHub Pages (always runs — keeps parkeasy.uk live)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: parkeasy.uk

      # Secondary: Vercel (runs only when VERCEL_TOKEN secret is configured)
      # To activate: add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
      # to GitHub repo secrets, then point parkeasy.uk DNS to Vercel.
      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
